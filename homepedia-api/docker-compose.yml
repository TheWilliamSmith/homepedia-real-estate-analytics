services:
  db:
    image: postgres:16-alpine
    container_name: homepedia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homepedia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homepedia}
      POSTGRES_DB: ${POSTGRES_DB:-homepedia}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
